semantic_type: location

signals:
  bullets: []
  numbering_regex: []
  # Trigger phrases for location enumerations (generic epidemiology phrasing).
  trigger_phrases:
    - "were reported in"
    - "was reported in"
    - "reported in"
    - "were found in"
    - "was found in"
    - "found in"
    - "occurred in"
    - "occur in"
    - "distributed in"
    - "distribution in"
    - "分布于"
    - "分布在"
    - "发生在"
    - "报告于"
    - "报告在"
  # Structural cue for epidemiology enumerations like "Cangzhou (70 cases), ..."
  paren_cases_regex: "\\(\\s*\\d+\\s+cases?\\s*\\)"
  # Prefer capturing the location token directly (reduces chapter-title pollution).
  # This extracts only the entity token before "(N cases)".
  paren_cases_capture_regex: "([A-Za-z][A-Za-z\\-]{2,})\\s*\\(\\s*\\d+\\s+cases?\\s*\\)"

split:
  delimiters:
    - ","
    - ";"
    - " and "
    - "、"
    - "，"
    - "；"
    - "及"
    - "以及"

confidence:
  trigger_phrase: 0.55
  paren_cases: 0.6

